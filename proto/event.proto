syntax = "proto3";

message Event {
  string sender_id       = 1;  // 誰が
  int64  timestamp       = 2;  // いつ
  bytes  payload         = 3;  // 何を
  bytes  signature       = 4;  // 本人証明
}

message EncryptedPayload {
  bytes nonce      = 1;
  bytes ciphertext = 2;
  bytes key_hash   = 3;
}

message NetworkEvent {
  Event  event           = 1;
  uint64 sequence_number = 2;
}