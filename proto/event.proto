syntax = "proto3";
package space;

enum SignatureAlgorithm {
  UNKNOWN    = 0;
  ED25519    = 1;
  ML_DSA_44  = 2;
  ML_DSA_65  = 3;
  ML_DSA_87  = 4;
}

// Hash: BLAKE3, 256-bit output (fixed)

message Event {
  bytes              p_id      = 1; // Participant's public key
  string             namespace = 2; // field identifier
  bytes              payload   = 3; // arbitrary bytes
  SignatureAlgorithm algorithm = 4; // Participant's signature algorithm
  bytes              p_sig     = 5; // Participant's signature
  //  p_sig = sign(
  //    BLAKE3(p_id)              ||
  //    BLAKE3(namespace)         ||
  //    BLAKE3(payload)           ||
  //    BLAKE3(algorithm)   
  //  )
}

message NetworkEvent {
  bytes              o_id      = 1; // Observer's public key
  Event              event     = 2; // original event
  uint64             seq       = 3; // global monotonic sequence
  SignatureAlgorithm algorithm = 4; // Observer's signature algorithm
  bytes              o_sig     = 5; // Observer's signature
  //  o_sig = sign(
  //    BLAKE3(o_id)              ||
  //    BLAKE3(event.p_id)        ||
  //    BLAKE3(event.namespace)   ||
  //    BLAKE3(event.payload)     ||
  //    BLAKE3(event.algorithm)   ||
  //    BLAKE3(event.p_sig)       ||
  //    BLAKE3(algorithm)         ||
  //    BLAKE3(seq)
  // )
}